---
- hosts: all
  vars:
    zmachine_install_dir: /boot/firmware/zmachine
    zmachine_service_env: "{{ zmachine_install_dir }}/service.env"
    zmachine_config_toml: "{{ zmachine_install_dir }}/config.toml"
  vars_files:
    - vars/firmware.yml

  tasks:
    - name: Unwanted packages are not installed
      ansible.builtin.apt:
        pkg:
          - avahi-daemon
          - bluez
          - bluez-firmware
          - cloud-init
          - modemmanager
          - rpicam-apps-core
          - rpicam-apps-lite
          - rpi-connect-lite
          - rpi-cloud-init-mods
          - rpi-swap
        state: absent
      become: yes
      tags:
        - packages

    - name: Required packages are installed
      ansible.builtin.apt:
        pkg:
          - git
          - golang
          - libsdl2-dev
          - tio
          - tmux
          - virtualenv
      become: yes
      tags:
        - packages

    - name: Unwanted systemd units are masked
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
        state: stopped
      loop:
        - apt-daily
        - apt-daily.timer
        - apt-daily-upgrade
        - apt-daily-upgrade.timer
        - avahi-daemon
        - avahi-daemon.socket
        - bluetooth
        - man-db.timer
        - swap.target
      become: yes
      tags:
        - services

    - name: Unwanted files don't exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /boot/firmware/zmachine.env
        - /boot/firmware/zmachine.toml
        - /etc/modules-load.d/zmachine.conf
        - /usr/bin/zmachine
        - /var/lib/man-db/auto-update
        - /var/swap
      become: yes
      tags:
        - filesystem

    - name: Required directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ zmachine_install_dir }}"
        - /opt/firmware
      become: yes
      tags:
        - filesystem

    - name: Bootloader is configured
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: '^\s*#?\s*{{ item }}'
        line: "{{ item }}"
      loop:
        - dtparam=i2s=on
        - dtparam=spi=on
      become: yes
      tags:
        - boot

    - name: Bootloader is configured
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: '^\s*#?\s*{{ item }}'
        line: "#{{ item }}"
      loop:
        - dtparam=i2c_arm=on
        - dtparam=audio=on
        - camera_auto_detect=1
        - display_auto_detect=1
        - dtoverlay=vc4-kms-v3d
        - max_framebuffers=2
      become: yes
      tags:
        - boot

    - name: Bootloader is configured
      ansible.builtin.blockinfile:
        path: /boot/firmware/config.txt
        block: |
          # Disable any boot delay in case zero isn't the default
          boot_delay=0

          # Disable the rainbow splash screen
          disable_splash=1

          # Disable Bluetooth
          dtoverlay=disable-bt

          # Disable composite video output
          enable_tvout=0

          # Enable cut-down firmware. This causes some errors in dmesg
          # (compare `notes/gpu_mem-{16,32}.dmesg`) but saves a chunk
          # of RAM (`free -m` total goes from 416 with default gpu_mem
          # to 464 with `gpu_mem=16`, i.e. the default must be 64 MiB).
          # It also trims about half a second off the boot time.
          gpu_mem=16

          # Enable I2S (PCM5102) audio
          dtoverlay=hifiberry-dac
      become: yes
      tags:
        - boot

    - name: Zmachine is configured
      ansible.builtin.copy:
        dest: "{{ zmachine_config_toml }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [ui.display]
          enabled = true
          type = "waveshare_2in23_oled"
          ssd1305.dc = "GPIO17"
          ssd1305.rst = "GPIO16"
      become: yes
      tags:
        - services

    - name: Service is configured
      ansible.builtin.copy:
        dest: "{{ zmachine_service_env }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          LOG_LEVEL=debug
          XDG_RUNTIME_DIR=/run/zmachine
          ZMACHINE_CONFIG_TOML={{ zmachine_config_toml }}
      become: yes
      tags:
        - services

    - name: Service is installed
      ansible.builtin.copy:
        src: zmachine.service
        dest: /usr/lib/systemd/system/zmachine.service
        owner: root
        group: root
        mode: "0644"
      become: yes
      tags:
        - services

    - name: Service is enabled
      ansible.builtin.systemd:
        name: zmachine
        enabled: yes
        masked: no
      become: yes
      tags:
        - services

    - name: Bash is configured
      ansible.builtin.copy:
        dest: ~/.bash_aliases
        mode: "0644"
        content: |
          alias ll="ls -l"
          alias rm="rm -i"
          alias cp="cp -i"
          alias mv="mv -i"
      tags:
        - devel

    - name: Git is configured
      ansible.builtin.copy:
        src: ~/.gitconfig
        dest: ~/.gitconfig
        mode: "0644"
      tags:
        - devel

    - name: Ampy is installed
      ansible.builtin.pip:
        name: adafruit-ampy
        virtualenv: /opt/ampy
      become: yes
      tags:
        - devel

    - name: Ampy is configured
      ansible.builtin.file:
        src: /opt/ampy/bin/ampy
        dest: /usr/local/bin/ampy
        state: link
      become: yes
      tags:
        - devel

    - name: Required firmware is downloaded
      ansible.builtin.get_url:
        url: "{{ item['download_url'] }}"
        dest: "{{ item['local_path'] }}"
        checksum: "{{ item['checksum'] }}"
      loop:
        - "{{ circuitpython_10_1_4 }}"
      become: yes
      tags:
        - devel

    - name: User Zmachine config directory exists
      ansible.builtin.file:
        path: ~/.config/zmachine
        state: directory
      tags:
        - devel

    - name: User Zmachine config symlink exists
      ansible.builtin.file:
        path: ~/.config/zmachine/config.toml
        state: link
        src: "{{ zmachine_config_toml }}"
      tags:
        - devel

    - name: /boot/firmware is read-only
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '(\s+/boot(?:/firmware)?\s+\S+\s+\S+?)(?:,ro)?(\s+)'
        replace: '\1,ro\2'
      become: yes
      tags:
        - readonlyboot
